name: Release

on:
  workflow_call:
    inputs:
      archive_name_prefix:
        required: true
        type: string
        description: "Archive name prefix (e.g. ros_noetic)"
      extra_files:
        required: false
        type: string
        default: ""
        description: "Space-separated list of extra files/dirs to include in archive"

jobs:
  # ────────────────────────────────────────────────────────────────
  # #800 — caller-contract preflight. Same self-validation the build
  # worker runs: a caller that forgot a required input fails within
  # seconds with a plain-language fix, before any archive work. The
  # declared requirement list is script/ci/preflight/release.manifest,
  # validated by script/ci/preflight.sh — both fetched from base at the
  # SAME ref as this workflow (github.job_workflow_sha) so the validator
  # never drifts from the worker. The logic is tested under `just test`.
  # ────────────────────────────────────────────────────────────────
  preflight:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout base worker source (version-matched via job_workflow_sha)
        uses: actions/checkout@v7
        with:
          repository: ycpss91255-docker/base
          ref: ${{ github.job_workflow_sha }}
          path: .preflight-base
      - name: Validate caller contract (preflight)
        env:
          PREFLIGHT_INPUT_ARCHIVE_NAME_PREFIX: ${{ inputs.archive_name_prefix }}
        run: bash .preflight-base/script/ci/preflight.sh .preflight-base/script/ci/preflight/release.manifest

  release:
    needs: [preflight]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Create release archive
        run: |
          VERSION="${GITHUB_REF_NAME}"
          ARCHIVE_NAME="${{ inputs.archive_name_prefix }}-${VERSION}"

          mkdir -p "${ARCHIVE_NAME}"

          # Copy standard files (symlinks are resolved by cp). setup.conf
          # and compose.yaml are intentionally omitted from the archive —
          # both are derived per-host artifacts generated by setup.sh on
          # the consumer's first `./build.sh` (compose.yaml has been
          # gitignored since v0.9.0; including it here is a latent bug
          # that silently broke `call-release` on any tag push).
          cp -r Dockerfile \
                script/ .hadolint.yaml test/bats/smoke/ \
                .base/ \
                README.md doc/ "${ARCHIVE_NAME}/"

          # Copy extra repo-specific files if specified
          if [ -n "${{ inputs.extra_files }}" ]; then
            for f in ${{ inputs.extra_files }}; do
              if [ -e "${f}" ]; then
                cp -r "${f}" "${ARCHIVE_NAME}/"
              fi
            done
          fi

          tar czf "${ARCHIVE_NAME}.tar.gz" "${ARCHIVE_NAME}"
          zip -r  "${ARCHIVE_NAME}.zip"    "${ARCHIVE_NAME}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          body_path: doc/changelog/CHANGELOG.md
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: |
            ${{ inputs.archive_name_prefix }}-*.tar.gz
            ${{ inputs.archive_name_prefix }}-*.zip
