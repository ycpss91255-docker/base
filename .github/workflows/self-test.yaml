name: CI

on:
  push:
    branches: [main, master]
    tags:
      - 'v*'
  pull_request:
  workflow_dispatch:

jobs:
  actionlint:
    # Catch GHA workflow-validator semantic regressions (the
    # class behind the v0.26.0-rc1 wedge, #297) before the
    # bats / docker matrix burns CI minutes. Runs first; the
    # other jobs gate on it. Refs #305.
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run actionlint via Docker
        run: |
          set -euo pipefail
          docker run --rm \
            -v "${GITHUB_WORKSPACE}:/repo:ro" \
            -w /repo \
            rhysd/actionlint:1.7.7 \
            -color

  classify:
    # Per-PR diff classifier (pure shell, no third-party GHA action — same
    # spirit as #273 Phase 2's build-worker.yaml classifier). Emits two
    # outputs for downstream jobs:
    #   code_changed         — false if the PR changes only doc/** + README.md + LICENSE
    #   behavioural_relevant — false if the PR does NOT touch any path in the
    #                          behavioural block-list (script/entrypoint.sh,
    #                          compose.yaml, Dockerfile.example,
    #                          Dockerfile.test-tools, build/run/exec/stop.sh,
    #                          downstream/script/base/{init,upgrade}.sh,
    #                          test/bats/behavioural/**, .github/workflows/**)
    # Non-PR events (push / tag / workflow_dispatch) default to 'true' on
    # both outputs so post-merge / release builds run the full suite.
    # See issue #317 for the full design and path-list rationale.
    needs: actionlint
    runs-on: ubuntu-latest
    outputs:
      code_changed: ${{ steps.diff.outputs.code_changed }}
      behavioural_relevant: ${{ steps.diff.outputs.behavioural_relevant }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - id: diff
        env:
          EVENT_NAME: ${{ github.event_name }}
          BASE_REF: ${{ github.base_ref }}
        # `-e` is intentionally omitted. The `test` job is the only branch-
        # protection-required check, and the chain `test needs classify`
        # means any non-zero exit here blocks every PR merge (Q4 fail-closed
        # chain — see issue #317). Failing open by treating diff errors as
        # "differences exist" (handled naturally by the `if git diff` form,
        # which routes any non-zero exit to the else branch) costs at most
        # one needless full-suite run on a misclassified doc-only PR — far
        # cheaper than wedging the merge queue.
        run: |
          set -uo pipefail
          if [[ "${EVENT_NAME}" != "pull_request" ]]; then
            # push to main / tag push / workflow_dispatch — full suite.
            echo "code_changed=true" >> "${GITHUB_OUTPUT}"
            echo "behavioural_relevant=true" >> "${GITHUB_OUTPUT}"
            exit 0
          fi
          # Fork PRs (and some squash-merged histories) reach this step
          # without the base ref present in the local repo: actions/checkout
          # with `fetch-depth: 0` fetches the head branch's full history but
          # does NOT fetch the base. Pre-fetch defensively; `|| true` lets
          # us continue even if the fetch fails, because the diff below
          # will then return non-zero and the `if` falls through to the
          # fail-open path.
          git fetch origin \
            "${BASE_REF}:refs/remotes/origin/${BASE_REF}" \
            --depth=200 >/dev/null 2>&1 || true
          BASE="origin/${BASE_REF}"
          # code_changed: anything outside the doc-only allow-list.
          if git diff --quiet "${BASE}"...HEAD \
               -- ':!doc/**' ':!README.md' ':!LICENSE'; then
            echo "code_changed=false" >> "${GITHUB_OUTPUT}"
          else
            echo "code_changed=true" >> "${GITHUB_OUTPUT}"
          fi
          # behavioural_relevant: block-list (Q5 in #317; #317 P3 gotcha-5
          # extends it to setup.sh + lib/** + i18n.sh + prune.sh — each
          # of these affects .env / compose.yaml generation or wrapper
          # behaviour that the behavioural docker.sock-mounted compose
          # service exercises end-to-end).
          if git diff --quiet "${BASE}"...HEAD \
               -- 'script/entrypoint.sh' \
                  'compose.yaml' \
                  'downstream/dockerfile/Dockerfile' \
                  'dockerfile/Dockerfile.test-tools' \
                  'downstream/script/docker/wrapper/build.sh' \
                  'downstream/script/docker/wrapper/run.sh' \
                  'downstream/script/docker/wrapper/exec.sh' \
                  'downstream/script/docker/wrapper/stop.sh' \
                  'downstream/script/docker/wrapper/prune.sh' \
                  'downstream/script/docker/wrapper/setup.sh' \
                  'downstream/script/docker/lib/i18n.sh' \
                  'downstream/script/docker/lib/**' \
                  'test/bats/behavioural/**' \
                  'downstream/script/base/init.sh' \
                  'downstream/script/base/upgrade.sh' \
                  '.github/workflows/**'; then
            echo "behavioural_relevant=false" >> "${GITHUB_OUTPUT}"
          else
            echo "behavioural_relevant=true" >> "${GITHUB_OUTPUT}"
          fi

  shellcheck:
    # Dedicated ShellCheck job (#376). Runs on plain ubuntu-latest where
    # shellcheck is pre-installed, no buildx / test-tools image needed.
    # A 30s shellcheck regression now surfaces in ~45s wall time instead
    # of waiting for the full bats suite inside the `test` job. The
    # `test` job passes --bats-only so the shellcheck phase doesn't run
    # twice; local `just test` keeps the full pipeline.
    needs: [actionlint, classify]
    if: needs.classify.outputs.code_changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run ShellCheck
        run: ./script/test/test.sh --shellcheck-only

  hadolint:
    # Dedicated Hadolint job (#376). Lints the two template-owned
    # Dockerfiles (downstream/dockerfile/Dockerfile +
    # dockerfile/Dockerfile.test-tools) with downstream/.hadolint.yaml.
    # #650 / ADR-00000011: this job now runs the SAME driver
    # (script/test/drivers/hadolint.sh, via `test.sh --hadolint-only`)
    # that `just test` runs locally, instead of the hadolint-action. The
    # driver is the single source of truth for the Dockerfile list +
    # config, so local `just test` and this CI job can never drift. The
    # driver needs the `hadolint` binary, which the test-tools image bakes
    # in, so this job obtains that image (mirroring the bats jobs' #317 P2
    # 3-layer fallback) and runs the driver inside it via the ci service.
    needs: [actionlint, classify]
    if: needs.classify.outputs.code_changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Obtain test-tools:local (#317 P2 3-layer fallback)
        id: obtain
        env:
          EVENT_NAME: ${{ github.event_name }}
          BASE_REF: ${{ github.base_ref }}
        run: |
          set -uo pipefail
          if [[ "${EVENT_NAME}" == "pull_request" ]]; then
            git fetch origin \
              "${BASE_REF}:refs/remotes/origin/${BASE_REF}" \
              --depth=200 >/dev/null 2>&1 || true
            if ! git diff --quiet \
                 "origin/${BASE_REF}"...HEAD \
                 -- dockerfile/Dockerfile.test-tools; then
              echo "build_local=true" >> "${GITHUB_OUTPUT}"
              exit 0
            fi
          fi
          if docker pull --platform linux/amd64 \
               ghcr.io/ycpss91255-docker/test-tools:main 2>/dev/null; then
            docker tag \
              ghcr.io/ycpss91255-docker/test-tools:main \
              test-tools:local
            # Probe the pulled :main for the tools this run needs. The
            # release-test-tools workflow republishes :main on a
            # Dockerfile.test-tools change CONCURRENTLY with this run, so a
            # freshly-baked tool (e.g. kcov, baked in by the change behind
            # release tag history) can be ABSENT from the :main we just
            # pulled. On any missing tool, fall back to building locally
            # from dockerfile/Dockerfile.test-tools (the same build the
            # layer-1 / layer-3 path uses) -> self-correcting against a
            # stale / racing / old :main regardless of cause. Extend
            # REQUIRED_TOOLS as the image gains new required tools.
            REQUIRED_TOOLS="kcov bats shellcheck hadolint"
            read -ra _required <<< "${REQUIRED_TOOLS}"
            probe_ok=true
            for _tool in "${_required[@]}"; do
              if ! docker run --rm test-tools:local \
                   sh -c "command -v ${_tool}" >/dev/null 2>&1; then
                echo "::warning::test-tools:main is missing '${_tool}'" \
                     "(stale / racing republish); rebuilding from source"
                probe_ok=false
                break
              fi
            done
            if [[ "${probe_ok}" == "true" ]]; then
              echo "build_local=false" >> "${GITHUB_OUTPUT}"
              exit 0
            fi
            echo "build_local=true" >> "${GITHUB_OUTPUT}"
            exit 0
          fi
          echo "build_local=true" >> "${GITHUB_OUTPUT}"

      - name: Build test-tools:local (with GHA cache)
        if: steps.obtain.outputs.build_local == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: dockerfile/Dockerfile.test-tools
          tags: test-tools:local
          load: true
          cache-from: type=gha,scope=test-tools
          cache-to: type=gha,scope=test-tools,mode=max

      - name: Run Hadolint via the driver (single source of truth)
        env:
          TEST_TOOLS_IMAGE: test-tools:local
        run: ./script/test/test.sh --lint --hadolint

  bats-unit:
    # Matrix shard of the unit suite (#377). Replaces the previous
    # monolithic `test` job's unit phase. Round-robin partition over
    # `find test/bats/unit -name '*_spec.bats' | sort` keeps each shard's
    # file count balanced enough at the current ~30 spec scale; weight
    # by test count per spec is deferred (#377 out-of-scope).
    #
    # Shards run in parallel — the wall-time gain comes from cutting
    # the pre-#376 5min `test` job (which serialised 1308 unit + 64
    # integration + shellcheck) into 4 parallel jobs each ~1-2min.
    # ci-rollup folds each matrix shard's result into a single
    # `needs.bats-unit.result` so branch-protection sees one signal.
    needs: [actionlint, classify]
    if: needs.classify.outputs.code_changed == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shard: ['1/4', '2/4', '3/4', '4/4']
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Obtain test-tools:local (#317 P2 3-layer fallback)
        id: obtain
        env:
          EVENT_NAME: ${{ github.event_name }}
          BASE_REF: ${{ github.base_ref }}
        # Layer 1: PR touched Dockerfile.test-tools -> must rebuild from
        # source (the :main rolling tag still reflects the pre-PR state).
        # Layer 2: try pulling the rolling :main tag and re-tag locally;
        # avoids a buildx run on the hot path (every non-Dockerfile-test-
        # tools PR).
        # Layer 3: pull failed (first bootstrap of :main, network, GHCR
        # auth gap) -> emit build_local=true and let the buildx step
        # below take over with GHA cache.
        run: |
          set -uo pipefail
          if [[ "${EVENT_NAME}" == "pull_request" ]]; then
            git fetch origin \
              "${BASE_REF}:refs/remotes/origin/${BASE_REF}" \
              --depth=200 >/dev/null 2>&1 || true
            if ! git diff --quiet \
                 "origin/${BASE_REF}"...HEAD \
                 -- dockerfile/Dockerfile.test-tools; then
              echo "build_local=true" >> "${GITHUB_OUTPUT}"
              exit 0
            fi
          fi
          if docker pull --platform linux/amd64 \
               ghcr.io/ycpss91255-docker/test-tools:main 2>/dev/null; then
            docker tag \
              ghcr.io/ycpss91255-docker/test-tools:main \
              test-tools:local
            # Probe the pulled :main for the tools this run needs. The
            # release-test-tools workflow republishes :main on a
            # Dockerfile.test-tools change CONCURRENTLY with this run, so a
            # freshly-baked tool (e.g. kcov, baked in by the change behind
            # release tag history) can be ABSENT from the :main we just
            # pulled. On any missing tool, fall back to building locally
            # from dockerfile/Dockerfile.test-tools (the same build the
            # layer-1 / layer-3 path uses) -> self-correcting against a
            # stale / racing / old :main regardless of cause. Extend
            # REQUIRED_TOOLS as the image gains new required tools.
            REQUIRED_TOOLS="kcov bats shellcheck hadolint"
            read -ra _required <<< "${REQUIRED_TOOLS}"
            probe_ok=true
            for _tool in "${_required[@]}"; do
              if ! docker run --rm test-tools:local \
                   sh -c "command -v ${_tool}" >/dev/null 2>&1; then
                echo "::warning::test-tools:main is missing '${_tool}'" \
                     "(stale / racing republish); rebuilding from source"
                probe_ok=false
                break
              fi
            done
            if [[ "${probe_ok}" == "true" ]]; then
              echo "build_local=false" >> "${GITHUB_OUTPUT}"
              exit 0
            fi
            echo "build_local=true" >> "${GITHUB_OUTPUT}"
            exit 0
          fi
          echo "build_local=true" >> "${GITHUB_OUTPUT}"

      - name: Build test-tools:local (with GHA cache)
        if: steps.obtain.outputs.build_local == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: dockerfile/Dockerfile.test-tools
          tags: test-tools:local
          load: true
          cache-from: type=gha,scope=test-tools
          cache-to: type=gha,scope=test-tools,mode=max

      - name: Run Bats unit shard ${{ matrix.shard }}
        env:
          TEST_TOOLS_IMAGE: test-tools:local
        run: ./script/test/test.sh --bats-unit-shard ${{ matrix.shard }}

  bats-integration:
    # Dedicated job for the 64 integration specs (#377). Pre-#377 these
    # ran sequentially after the 1308 unit specs inside the monolithic
    # `test` job; pulling them into their own job removes that tail
    # from each unit shard's wall time.
    needs: [actionlint, classify]
    if: needs.classify.outputs.code_changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Obtain test-tools:local (#317 P2 3-layer fallback)
        id: obtain
        env:
          EVENT_NAME: ${{ github.event_name }}
          BASE_REF: ${{ github.base_ref }}
        run: |
          set -uo pipefail
          if [[ "${EVENT_NAME}" == "pull_request" ]]; then
            git fetch origin \
              "${BASE_REF}:refs/remotes/origin/${BASE_REF}" \
              --depth=200 >/dev/null 2>&1 || true
            if ! git diff --quiet \
                 "origin/${BASE_REF}"...HEAD \
                 -- dockerfile/Dockerfile.test-tools; then
              echo "build_local=true" >> "${GITHUB_OUTPUT}"
              exit 0
            fi
          fi
          if docker pull --platform linux/amd64 \
               ghcr.io/ycpss91255-docker/test-tools:main 2>/dev/null; then
            docker tag \
              ghcr.io/ycpss91255-docker/test-tools:main \
              test-tools:local
            # Probe the pulled :main for the tools this run needs. The
            # release-test-tools workflow republishes :main on a
            # Dockerfile.test-tools change CONCURRENTLY with this run, so a
            # freshly-baked tool (e.g. kcov, baked in by the change behind
            # release tag history) can be ABSENT from the :main we just
            # pulled. On any missing tool, fall back to building locally
            # from dockerfile/Dockerfile.test-tools (the same build the
            # layer-1 / layer-3 path uses) -> self-correcting against a
            # stale / racing / old :main regardless of cause. Extend
            # REQUIRED_TOOLS as the image gains new required tools.
            REQUIRED_TOOLS="kcov bats shellcheck hadolint"
            read -ra _required <<< "${REQUIRED_TOOLS}"
            probe_ok=true
            for _tool in "${_required[@]}"; do
              if ! docker run --rm test-tools:local \
                   sh -c "command -v ${_tool}" >/dev/null 2>&1; then
                echo "::warning::test-tools:main is missing '${_tool}'" \
                     "(stale / racing republish); rebuilding from source"
                probe_ok=false
                break
              fi
            done
            if [[ "${probe_ok}" == "true" ]]; then
              echo "build_local=false" >> "${GITHUB_OUTPUT}"
              exit 0
            fi
            echo "build_local=true" >> "${GITHUB_OUTPUT}"
            exit 0
          fi
          echo "build_local=true" >> "${GITHUB_OUTPUT}"

      - name: Build test-tools:local (with GHA cache)
        if: steps.obtain.outputs.build_local == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: dockerfile/Dockerfile.test-tools
          tags: test-tools:local
          load: true
          cache-from: type=gha,scope=test-tools
          cache-to: type=gha,scope=test-tools,mode=max

      - name: Run Bats integration suite
        env:
          TEST_TOOLS_IMAGE: test-tools:local
        run: ./script/test/test.sh --bats-integration

  coverage:
    # Sharded kcov coverage, now an ENFORCED PR gate (#615, ADR-00000008;
    # amends #377). #377 left this path fully serial (~8-12 min single
    # kcov job) and sidestepped the cost by making it main-push-only +
    # non-gating. #615 reverses that: the kcov run is split into a matrix
    # of shards that MIRROR the bats-unit matrix (identical round-robin
    # slice per index via _shard_unit_files), so per-shard wall-time is in
    # the bats-unit ballpark (~one shard, parallel with bats-unit). It now
    # runs on PRs too, and joins ci-rollup's `needs:` so a kcov failure OR
    # a coverage drop below the .codecov.yaml project threshold blocks
    # merge. Each shard uploads its partial report under a per-shard flag;
    # Codecov merges the uploads into one project figure ("Found N
    # coverage files to report"). The matrix rollup folds every shard's
    # result into needs.coverage.result, so ci-rollup sees one signal.
    #
    # #686: kcov is now source-built into the shared alpine test-tools
    # image, so each shard obtains that one image (same 3-layer fallback as
    # bats-unit) instead of the old debian kcov/kcov image that apt-
    # installed ~24 packages every shard every PR. The per-shard apt
    # rebuild (and its APT_MIRROR_DEBIAN fragility) is gone.
    needs: [actionlint, classify]
    if: needs.classify.outputs.code_changed == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shard: ['1/4', '2/4', '3/4', '4/4']
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Obtain test-tools:local (#317 P2 3-layer fallback)
        id: obtain
        env:
          EVENT_NAME: ${{ github.event_name }}
          BASE_REF: ${{ github.base_ref }}
        # #686: the coverage service now runs on the SAME pre-baked alpine
        # test-tools image as bats-unit (kcov is source-built into it), so
        # this job obtains it via the identical 3-layer fallback the
        # bats-unit / bats-integration jobs use — no more debian kcov/kcov
        # image, no per-shard apt-install, no APT_MIRROR_DEBIAN. Layer 1:
        # PR touched Dockerfile.test-tools -> rebuild from source. Layer 2:
        # pull the rolling :main tag and re-tag locally (hot path). Layer
        # 3: pull failed -> build below with GHA cache.
        run: |
          set -uo pipefail
          if [[ "${EVENT_NAME}" == "pull_request" ]]; then
            git fetch origin \
              "${BASE_REF}:refs/remotes/origin/${BASE_REF}" \
              --depth=200 >/dev/null 2>&1 || true
            if ! git diff --quiet \
                 "origin/${BASE_REF}"...HEAD \
                 -- dockerfile/Dockerfile.test-tools; then
              echo "build_local=true" >> "${GITHUB_OUTPUT}"
              exit 0
            fi
          fi
          if docker pull --platform linux/amd64 \
               ghcr.io/ycpss91255-docker/test-tools:main 2>/dev/null; then
            docker tag \
              ghcr.io/ycpss91255-docker/test-tools:main \
              test-tools:local
            # Probe the pulled :main for the tools this run needs. The
            # release-test-tools workflow republishes :main on a
            # Dockerfile.test-tools change CONCURRENTLY with this run, so a
            # freshly-baked tool (e.g. kcov, baked in by the change behind
            # release tag history) can be ABSENT from the :main we just
            # pulled. On any missing tool, fall back to building locally
            # from dockerfile/Dockerfile.test-tools (the same build the
            # layer-1 / layer-3 path uses) -> self-correcting against a
            # stale / racing / old :main regardless of cause. Extend
            # REQUIRED_TOOLS as the image gains new required tools.
            REQUIRED_TOOLS="kcov bats shellcheck hadolint"
            read -ra _required <<< "${REQUIRED_TOOLS}"
            probe_ok=true
            for _tool in "${_required[@]}"; do
              if ! docker run --rm test-tools:local \
                   sh -c "command -v ${_tool}" >/dev/null 2>&1; then
                echo "::warning::test-tools:main is missing '${_tool}'" \
                     "(stale / racing republish); rebuilding from source"
                probe_ok=false
                break
              fi
            done
            if [[ "${probe_ok}" == "true" ]]; then
              echo "build_local=false" >> "${GITHUB_OUTPUT}"
              exit 0
            fi
            echo "build_local=true" >> "${GITHUB_OUTPUT}"
            exit 0
          fi
          echo "build_local=true" >> "${GITHUB_OUTPUT}"

      - name: Build test-tools:local (with GHA cache)
        if: steps.obtain.outputs.build_local == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: dockerfile/Dockerfile.test-tools
          tags: test-tools:local
          load: true
          cache-from: type=gha,scope=test-tools
          cache-to: type=gha,scope=test-tools,mode=max

      - name: Run kcov coverage shard ${{ matrix.shard }}
        env:
          TEST_TOOLS_IMAGE: test-tools:local
        run: ./script/test/test.sh --coverage-shard ${{ matrix.shard }}

      - name: Upload coverage to Codecov
        if: ${{ always() }}
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          directory: ./coverage
          # Per-shard flag so Codecov keeps the uploads distinct and merges
          # them for the commit. fail_ci_if_error stays false: an upload
          # transport hiccup must not fail the shard (the merge tolerates a
          # missing shard); the MERGE gate is enforced by the codecov/project
          # status (.codecov.yaml) joined into ci-rollup via branch
          # protection, not by this step.
          flags: coverage-shard-${{ strategy.job-index }}
          fail_ci_if_error: false

  integration-e2e:
    name: Integration E2E (${{ matrix.platform }})
    needs: [actionlint, classify]
    if: needs.classify.outputs.code_changed == 'true'
    # A2 (#603): verify the init.sh -> build -> run -> exec -> stop
    # runnability contract on BOTH arches via native runners (no QEMU).
    # Static 2-entry matrix mirroring the platform->runner convention in
    # build-worker / publish-worker / release-test-tools (#587); a shared
    # platform->runner single-source is a follow-up in that umbrella.
    # ci-rollup aggregates the matrixed job through
    # needs.integration-e2e.result (all shards must succeed), so no
    # rollup change is needed.
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
            hardware: amd64
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            hardware: arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        # Use the docker driver (not docker-container) so test-tools:local
        # lives in the host docker daemon's image store. The subsequent
        # `./build.sh test` invokes `docker compose build`, whose
        # `FROM ${TEST_TOOLS_IMAGE}` lookup hits the host daemon — with
        # docker-container, buildx would have its own isolated store and
        # the FROM would try to pull from docker.io and fail
        # (`pull access denied, repository does not exist`). Trade-off:
        # the layer-3 fallback rebuild here is uncached (GHA cache
        # requires docker-container); since the hot path is `docker pull
        # :main` (no buildx involved), the cache loss only matters in
        # the bootstrap window or when Dockerfile.test-tools changes.
        uses: docker/setup-buildx-action@v4
        with:
          driver: docker

      - name: Obtain test-tools:local (#317 P2 3-layer fallback)
        env:
          EVENT_NAME: ${{ github.event_name }}
          BASE_REF: ${{ github.base_ref }}
        # Inline rebuild on layers 1 + 3 because the docker driver above
        # cannot use docker/build-push-action's GHA cache. Plain
        # `docker build` matches the pre-P2 behaviour in this job; the
        # net effect of P2 here is the hot path (layer 2) skipping the
        # rebuild entirely.
        run: |
          set -uo pipefail
          if [[ "${EVENT_NAME}" == "pull_request" ]]; then
            git fetch origin \
              "${BASE_REF}:refs/remotes/origin/${BASE_REF}" \
              --depth=200 >/dev/null 2>&1 || true
            if ! git diff --quiet \
                 "origin/${BASE_REF}"...HEAD \
                 -- dockerfile/Dockerfile.test-tools; then
              docker build \
                -t test-tools:local \
                -f dockerfile/Dockerfile.test-tools .
              exit 0
            fi
          fi
          if docker pull --platform ${{ matrix.platform }} \
               ghcr.io/ycpss91255-docker/test-tools:main 2>/dev/null; then
            docker tag \
              ghcr.io/ycpss91255-docker/test-tools:main \
              test-tools:local
            exit 0
          fi
          docker build \
            -t test-tools:local \
            -f dockerfile/Dockerfile.test-tools .

      - name: Create temp repo and run init.sh
        run: |
          set -euo pipefail
          TMP_ROOT="$(mktemp -d)"
          REPO_NAME="e2e_test"
          REPO_DIR="${TMP_ROOT}/${REPO_NAME}"
          mkdir -p "${REPO_DIR}/.base"

          # Mirror current template into the synthetic repo
          cp -a "${GITHUB_WORKSPACE}/." "${REPO_DIR}/.base/"

          cd "${REPO_DIR}"
          bash .base/downstream/script/base/init.sh

          # Sanity: verify symlinks resolve and core files exist.
          # Post-#330: wrappers live under script/; #546: the root user
          # entry is the justfile (the container-ops Makefile was retired).
          test -L script/build.sh && test -L script/run.sh \
            && test -L script/exec.sh && test -L script/stop.sh
          test -L script/setup_tui.sh
          test -L justfile
          test -f Dockerfile && test -f compose.yaml && test -f config/docker/setup.conf

          echo "REPO_DIR=${REPO_DIR}" >> "${GITHUB_ENV}"

      - name: Install just (container-ops entry point)
        # The e2e job drives the runnability contract through the SAME
        # `just` verbs downstream users invoke (post-#573 the documented
        # entry is `just`), so a broken script/docker/justfile is caught
        # here. `just` ships nowhere on ubuntu-latest; the other CI jobs
        # call ./script/test/test.sh directly and need no just. (The official
        # `just.systems/install.sh` returns 403 from GHA runners, so use
        # the maintained setup action instead.)
        uses: extractions/setup-just@v3

      - name: Build test stage (just docker build test)
        working-directory: ${{ env.REPO_DIR }}
        env:
          # build.sh skips its internal test-tools:local build when this
          # env is set (#317 P2). The pre-built image from the Obtain
          # step above is already loaded into the host's docker daemon,
          # so `docker compose build`'s Dockerfile.example `FROM
          # ${TEST_TOOLS_IMAGE}` resolves locally without re-running
          # the dockerfile/Dockerfile.test-tools build.
          TEST_TOOLS_IMAGE: test-tools:local
        run: |
          just docker build test

      - name: Build devel stage (just docker build)
        working-directory: ${{ env.REPO_DIR }}
        run: |
          just docker build

      - name: Run container detached and assert the runnability contract
        working-directory: ${{ env.REPO_DIR }}
        # A1 (#579): assert results, don't just run steps. The v0.41.0
        # user-args bug made `whoami` print `initial` yet the job stayed
        # green because nothing checked the output.
        run: |
          set -euo pipefail
          # The configured user is host-detected by setup.sh and cached in
          # .env.generated; read it rather than hardcoding the runner's.
          # shellcheck disable=SC1091
          source ./.env.generated
          : "${USER_NAME:?USER_NAME missing from .env.generated}"
          echo "configured USER_NAME=${USER_NAME}"

          just docker run -d
          just docker exec echo "just docker exec OK from CI"

          # Derive the container name at runtime (compose names it
          # ${USER_NAME}-${IMAGE_NAME}-<svc>; IMAGE_NAME is the e2e_test
          # repo dir). Filtering by the deterministic image-name substring
          # avoids reconstructing the full host-detected name.
          cname="$(docker ps --filter 'name=e2e_test' --filter 'status=running' \
                     --format '{{.Names}}' | head -n1)"

          # (2) container did NOT insta-exit (the entrypoint set -u class).
          if [[ -z "${cname}" ]]; then
            echo "ERROR: no running e2e_test container after just docker run -d"
            docker ps -a
            exit 1
          fi

          # (1) the in-container user is the configured one, not the
          # v0.41.0 'initial' bug nor 'root'.
          who="$(just docker exec id -un | tr -d '\r' | tail -n1)"
          echo "id -un inside container: ${who}"
          if [[ "${who}" != "${USER_NAME}" ]]; then
            echo "ERROR: container user '${who}' != configured '${USER_NAME}'"
            exit 1
          fi

          # (3) the ENTRYPOINT actually ran -- the wired entrypoint is
          # /entrypoint.sh (Dockerfile ENTRYPOINT ["/entrypoint.sh"]).
          path="$(docker inspect -f '{{.Path}}' "${cname}")"
          echo "container Path: ${path}"
          if [[ "${path}" != "/entrypoint.sh" ]]; then
            echo "ERROR: container entrypoint '${path}' != /entrypoint.sh"
            exit 1
          fi

          # (4) the ~/work workspace mount is present and writable inside.
          # Use simple per-call argv (not `just docker exec bash -c '<compound>'`,
          # whose quoting does not survive just's `{{args}}` splitting) and
          # an absolute path (the mount lands at /home/${USER_NAME}/work).
          work="/home/${USER_NAME}/work"
          just docker exec test -d "${work}"
          just docker exec touch "${work}/.e2e_probe"
          just docker exec rm -f "${work}/.e2e_probe"

      - name: Stop and assert full teardown (container + network gone)
        working-directory: ${{ env.REPO_DIR }}
        run: |
          set -euo pipefail
          just docker stop
          # (5a) no project container remains.
          if docker ps -a --format '{{.Names}}' | grep -q 'e2e_test'; then
            echo "ERROR: an e2e_test container remains after just docker stop"
            docker ps -a
            exit 1
          fi
          # (5b) the compose project's default network is gone. `compose
          # up` creates ${DOCKER_HUB_USER}-e2e_test_default even under
          # network_mode: host; `compose down` (run by stop.sh) removes it.
          if docker network ls --format '{{.Name}}' | grep -q 'e2e_test_default'; then
            echo "ERROR: an e2e_test project network remains after just docker stop"
            docker network ls
            exit 1
          fi

  behavioural:
    name: Behavioural Test (runtime-test smoke gate, #249)
    needs: [actionlint, classify]
    # P3 (#317): gate on the narrower `behavioural_relevant` output so
    # PRs that change pure lint / unit-test / doc paths (already covered
    # by `test`) don't burn the docker.sock-mounted compose run. The
    # block-list driving this output is in the `classify` job above;
    # gotcha-5 extends it to setup.sh + lib/** + i18n.sh + prune.sh.
    if: needs.classify.outputs.behavioural_relevant == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Obtain test-tools:local (#317 P2 3-layer fallback)
        id: obtain
        env:
          EVENT_NAME: ${{ github.event_name }}
          BASE_REF: ${{ github.base_ref }}
        run: |
          set -uo pipefail
          if [[ "${EVENT_NAME}" == "pull_request" ]]; then
            git fetch origin \
              "${BASE_REF}:refs/remotes/origin/${BASE_REF}" \
              --depth=200 >/dev/null 2>&1 || true
            if ! git diff --quiet \
                 "origin/${BASE_REF}"...HEAD \
                 -- dockerfile/Dockerfile.test-tools; then
              echo "build_local=true" >> "${GITHUB_OUTPUT}"
              exit 0
            fi
          fi
          if docker pull --platform linux/amd64 \
               ghcr.io/ycpss91255-docker/test-tools:main 2>/dev/null; then
            docker tag \
              ghcr.io/ycpss91255-docker/test-tools:main \
              test-tools:local
            # Probe the pulled :main for the tools this run needs. The
            # release-test-tools workflow republishes :main on a
            # Dockerfile.test-tools change CONCURRENTLY with this run, so a
            # freshly-baked tool (e.g. kcov, baked in by the change behind
            # release tag history) can be ABSENT from the :main we just
            # pulled. On any missing tool, fall back to building locally
            # from dockerfile/Dockerfile.test-tools (the same build the
            # layer-1 / layer-3 path uses) -> self-correcting against a
            # stale / racing / old :main regardless of cause. Extend
            # REQUIRED_TOOLS as the image gains new required tools.
            REQUIRED_TOOLS="kcov bats shellcheck hadolint"
            read -ra _required <<< "${REQUIRED_TOOLS}"
            probe_ok=true
            for _tool in "${_required[@]}"; do
              if ! docker run --rm test-tools:local \
                   sh -c "command -v ${_tool}" >/dev/null 2>&1; then
                echo "::warning::test-tools:main is missing '${_tool}'" \
                     "(stale / racing republish); rebuilding from source"
                probe_ok=false
                break
              fi
            done
            if [[ "${probe_ok}" == "true" ]]; then
              echo "build_local=false" >> "${GITHUB_OUTPUT}"
              exit 0
            fi
            echo "build_local=true" >> "${GITHUB_OUTPUT}"
            exit 0
          fi
          echo "build_local=true" >> "${GITHUB_OUTPUT}"

      - name: Build test-tools:local (with GHA cache)
        if: ${{ steps.obtain.outputs.build_local == 'true' }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: dockerfile/Dockerfile.test-tools
          tags: test-tools:local
          load: true
          cache-from: type=gha,scope=test-tools
          cache-to: type=gha,scope=test-tools,mode=max

      - name: Run behavioural specs (docker.sock-mounted ci-behavioural service)
        env:
          TEST_TOOLS_IMAGE: test-tools:local
        run: docker compose run --rm ci-behavioural

  ci-rollup:
    # Single aggregator required by branch protection. Every PR check
    # joins this `needs:` list so branch protection never needs to
    # change to track new sub-jobs. Pattern mirrors ros1_bridge's
    # `ci-summary` and env/* `ci-passed`.
    #
    # Hard-mandatory jobs (actionlint / classify) must succeed: SKIPPED
    # there indicates a workflow bug, not an intentional gate. The
    # post-#377 rollup has no remaining always-running test gate — bats
    # is now split into shard'd jobs that SKIP on doc-only PRs along
    # with everything else.
    #
    # Conditionally-gated jobs (shellcheck / hadolint / bats-unit /
    # bats-integration / coverage / integration-e2e / behavioural) carry
    # job-level `if:` so they SKIP on doc-only / non-behavioural PRs (#317
    # P1/P3, #376, #377, #615); the rollup collapses SKIPPED into pass for
    # those, otherwise doc-only PRs cannot merge.
    #
    # `coverage` is now IN `needs:` (#615, ADR-00000008; amends #377). It
    # is a sharded kcov PR gate: a kcov test failure fails the matrix and
    # this rollup; a coverage regression below the .codecov.yaml project
    # threshold is enforced separately via the codecov/project status as a
    # required branch-protection check. The matrix folds into
    # needs.coverage.result, so the rollup sees one signal.
    needs: [actionlint, classify, shellcheck, hadolint, bats-unit, bats-integration, coverage, integration-e2e, behavioural]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Verify upstream jobs
        env:
          ACTIONLINT_RESULT: ${{ needs.actionlint.result }}
          CLASSIFY_RESULT: ${{ needs.classify.result }}
          SHELLCHECK_RESULT: ${{ needs.shellcheck.result }}
          HADOLINT_RESULT: ${{ needs.hadolint.result }}
          BATS_UNIT_RESULT: ${{ needs.bats-unit.result }}
          BATS_INTEGRATION_RESULT: ${{ needs.bats-integration.result }}
          COVERAGE_RESULT: ${{ needs.coverage.result }}
          INTEGRATION_RESULT: ${{ needs.integration-e2e.result }}
          BEHAVIOURAL_RESULT: ${{ needs.behavioural.result }}
        run: |
          set -euo pipefail
          echo "actionlint:       ${ACTIONLINT_RESULT}"
          echo "classify:         ${CLASSIFY_RESULT}"
          echo "shellcheck:       ${SHELLCHECK_RESULT}"
          echo "hadolint:         ${HADOLINT_RESULT}"
          echo "bats-unit:        ${BATS_UNIT_RESULT}"
          echo "bats-integration: ${BATS_INTEGRATION_RESULT}"
          echo "coverage:         ${COVERAGE_RESULT}"
          echo "integration-e2e:  ${INTEGRATION_RESULT}"
          echo "behavioural:      ${BEHAVIOURAL_RESULT}"
          fail=0
          for r in "${ACTIONLINT_RESULT}" "${CLASSIFY_RESULT}"; do
            [[ "${r}" == "success" ]] || fail=1
          done
          for r in "${SHELLCHECK_RESULT}" "${HADOLINT_RESULT}" \
                   "${BATS_UNIT_RESULT}" "${BATS_INTEGRATION_RESULT}" \
                   "${COVERAGE_RESULT}" \
                   "${INTEGRATION_RESULT}" "${BEHAVIOURAL_RESULT}"; do
            [[ "${r}" == "success" || "${r}" == "skipped" ]] || fail=1
          done
          exit "${fail}"

  release:
    needs: [shellcheck, hadolint, bats-unit, bats-integration, integration-e2e, behavioural]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Create release archive
        run: |
          VERSION="${GITHUB_REF_NAME}"
          ARCHIVE_NAME="template-${VERSION}"

          mkdir -p "${ARCHIVE_NAME}"
          # init.sh / upgrade.sh now live under downstream/script/base/
          # (#654), already covered by the downstream/ entry below.
          cp -r justfile compose.yaml \
                downstream/ dockerfile/ test/ script/ doc/ \
                README.md LICENSE \
                "${ARCHIVE_NAME}/"

          tar czf "${ARCHIVE_NAME}.tar.gz" "${ARCHIVE_NAME}"
          zip -r  "${ARCHIVE_NAME}.zip"    "${ARCHIVE_NAME}"

      - name: Extract release notes for current tag
        run: |
          VERSION="${GITHUB_REF_NAME}"
          # Extract the section for current version from CHANGELOG.md
          # Matches "## [vX.Y.Z]" or "## [vX.Y.Z-rcN]" until the next "## ["
          awk -v ver="${VERSION}" '
            /^## \[/ {
              if (found) exit
              if (index($0, "[" ver "]")) { found=1; next }
            }
            found
          ' doc/changelog/CHANGELOG.md > /tmp/release-notes.md
          echo "--- Extracted release notes ---"
          cat /tmp/release-notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          body_path: /tmp/release-notes.md
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: |
            template-*.tar.gz
            template-*.zip
