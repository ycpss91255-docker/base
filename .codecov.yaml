coverage:
  status:
    project:
      default:
        # ENFORCED PR gate (#615, ADR-00000008; amends #377). Total project
        # coverage must not drop by more than `threshold` versus the base.
        # `informational: false` makes the codecov/project status fail (red
        # commit status) on a regression, so when added as a required
        # branch-protection check it BLOCKS merge — not just a comment.
        # `target: auto` compares against the PR base; 1% absorbs kcov line-
        # hit noise (the #613 kcov env fixes removed the spurious failures
        # that previously made this path red).
        target: auto
        threshold: 1%
        informational: false
    patch:
      default:
        # Patch (new-code) coverage handling, decided explicitly (#615): a
        # diff-scoped gate with `target: auto` rather than a fixed % so it
        # tracks the project rate instead of demanding e.g. 80% on every PR.
        # Many bash branches (case ;; arms, /lint fallback blocks, child-
        # bash guards) are intentionally not exercised, and a hard fixed
        # target would make refactor PRs flaky — the exact #613-class
        # brittleness this gate must avoid. `threshold: 1%` + `auto` keeps
        # the patch status honest (new code should not be markedly less
        # covered than the project) without false reds; `informational:
        # false` lets it gate once wired into branch protection.
        target: auto
        threshold: 1%
        informational: false

ignore:
  - "test/**/*"
  - ".github/**/*"

comment:
  layout: "reach,diff,flags,files"
  behavior: default
  require_changes: false
