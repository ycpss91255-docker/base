services:
  # Fast CI: ShellCheck + Bats only. Uses the prebuilt test-tools image
  # (alpine: bash + bats + bats-{support,assert,mock} + shellcheck +
  # hadolint baked in), so _install_deps short-circuits via its
  # `command -v bats` guard — no per-run apt-install. TEST_TOOLS_IMAGE
  # can be overridden to pin a specific tag during local rebuild flows;
  # default :latest tracks the most recent template release tag because
  # release-test-tools.yaml rebuilds it on every v* push.
  ci:
    image: ${TEST_TOOLS_IMAGE:-ghcr.io/ycpss91255-docker/test-tools:latest}
    security_opt:
      - seccomp=unconfined
    volumes:
      - .:/source
    working_dir: /source
    environment:
      - HOST_UID=${HOST_UID:-1000}
      - HOST_GID=${HOST_GID:-1000}
    entrypoint: /bin/bash
    command:
      - -c
      - ./script/test/test.sh --ci

  # Behavioural: same image as `ci` but with the host docker
  # socket mounted so test/bats/behavioural/*.bats can drive
  # `docker buildx build --target runtime-test ...` against synthesized
  # fixtures and assert build pass/fail. Opt-in: never invoked by the
  # default `just test` flow. Local users run via
  # `just test behavioural`; CI runs via a dedicated
  # Behavioural Test job
  # in self-test.yaml. The dedicated buildx builder (template-behavioural)
  # is created/pruned per test.sh --behavioural run so this service does
  # NOT pollute the host's default buildx context or shared image cache.
  ci-behavioural:
    image: ${TEST_TOOLS_IMAGE:-ghcr.io/ycpss91255-docker/test-tools:latest}
    security_opt:
      - seccomp=unconfined
    volumes:
      - .:/source
      - /var/run/docker.sock:/var/run/docker.sock
    working_dir: /source
    environment:
      - HOST_UID=${HOST_UID:-1000}
      - HOST_GID=${HOST_GID:-1000}
      - MOUNT_DOCKER_SOCK=1
    entrypoint: /bin/bash
    command:
      - -c
      - ./script/test/test.sh --ci --behavioural

  # Coverage: same pre-baked test-tools image as `ci`, plus kcov
  # instrumentation. kcov is now source-built INTO the test-tools
  # image (Dockerfile.test-tools kcov-builder stage; not in any Alpine
  # repo), so the coverage path runs on the same one-pull Alpine image as
  # the rest of the suite — no more debian kcov/kcov service, no per-shard
  # apt-install of ~24 packages (_install_deps), no APT_MIRROR_DEBIAN
  # fragility. The only difference from `ci` is COVERAGE=1, which routes
  # the in-container dispatch through _run_coverage.
  coverage:
    image: ${TEST_TOOLS_IMAGE:-ghcr.io/ycpss91255-docker/test-tools:latest}
    security_opt:
      - seccomp=unconfined
    volumes:
      - .:/source
    working_dir: /source
    environment:
      - HOST_UID=${HOST_UID:-1000}
      - HOST_GID=${HOST_GID:-1000}
    entrypoint: /bin/bash
    command:
      - -c
      - ./script/test/test.sh --ci
